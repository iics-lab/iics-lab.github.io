<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Low-jitter clocking and synchronization visual</title>
  <desc id="desc">A central clock IC distributes precise timing signals to synchronized circuit blocks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#071415"/><stop offset="0.55" stop-color="#162631"/><stop offset="1" stop-color="#091c20"/></linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse"><path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-opacity="0.05"/></pattern>
  </defs>
  <rect width="960" height="600" rx="28" fill="url(#bg)"/>
  <rect width="960" height="600" rx="28" fill="url(#grid)"/>
  <g transform="translate(360 158)">
    <circle cx="120" cy="120" r="152" fill="#45e0d0" opacity="0.07"/>
    <circle cx="120" cy="120" r="112" fill="none" stroke="#45e0d0" stroke-opacity="0.3" stroke-width="2"/>
    <circle cx="120" cy="120" r="78" fill="none" stroke="#ffd66b" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="8 10"/>
    <rect x="24" y="24" width="192" height="192" rx="28" fill="#0e2529" stroke="#8df4ec" stroke-opacity="0.65"/>
    <rect x="70" y="70" width="100" height="100" rx="18" fill="#132f35" stroke="#f2c75c" stroke-opacity="0.8"/>
    <circle cx="120" cy="120" r="22" fill="#45e0d0" opacity="0.85" filter="url(#glow)"/>
    <path d="M120 24v-54M120 216v54M24 120h-54M216 120h54" stroke="#d7e4e1" stroke-opacity="0.55" stroke-width="9" stroke-linecap="round"/>
  </g>
  <g fill="#122c32" stroke="#79e6df" stroke-opacity="0.6">
    <rect x="88" y="98" width="154" height="86" rx="15"/>
    <rect x="722" y="98" width="154" height="86" rx="15"/>
    <rect x="88" y="414" width="154" height="86" rx="15"/>
    <rect x="722" y="414" width="154" height="86" rx="15"/>
  </g>
  <g fill="none" stroke-linecap="round" filter="url(#glow)">
    <path d="M242 141 C310 141 320 235 384 254" stroke="#45e0d0" stroke-width="5"/>
    <path d="M722 141 C650 141 640 235 576 254" stroke="#45e0d0" stroke-width="5"/>
    <path d="M242 457 C310 457 320 365 384 346" stroke="#ffd66b" stroke-width="4"/>
    <path d="M722 457 C650 457 640 365 576 346" stroke="#ffd66b" stroke-width="4"/>
  </g>
  <g fill="none" stroke="#f4d36a" stroke-width="4" stroke-linecap="round" opacity="0.9">
    <path d="M116 142c16-32 32 32 48 0s32 32 48 0"/>
    <path d="M750 142c16-32 32 32 48 0s32 32 48 0"/>
    <path d="M116 458c16-32 32 32 48 0s32 32 48 0"/>
    <path d="M750 458c16-32 32 32 48 0s32 32 48 0"/>
  </g>
</svg>