<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">RF millimeter-wave IC and chip-antenna interface visual</title>
  <desc id="desc">A millimeter-wave chip drives a phased antenna array with beams toward 6G and satellite links.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#081118"/><stop offset="0.52" stop-color="#102339"/><stop offset="1" stop-color="#071b1c"/></linearGradient>
    <radialGradient id="beam" cx="45%" cy="55%" r="62%"><stop offset="0" stop-color="#45e0d0" stop-opacity="0.45"/><stop offset="0.55" stop-color="#45e0d0" stop-opacity="0.12"/><stop offset="1" stop-color="#45e0d0" stop-opacity="0"/></radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#ffffff" stroke-opacity="0.045"/></pattern>
  </defs>
  <rect width="960" height="600" rx="28" fill="url(#bg)"/>
  <rect width="960" height="600" rx="28" fill="url(#grid)"/>
  <ellipse cx="610" cy="270" rx="330" ry="230" fill="url(#beam)"/>
  <g transform="translate(116 305)">
