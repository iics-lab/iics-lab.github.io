<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">High-speed SerDes and data-center interconnect visual</title>
  <desc id="desc">A high-speed IC connected by glowing differential traces to data-center systems.</desc>
  <defs>
